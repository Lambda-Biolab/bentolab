# OpenOCD config for the Bento Lab V1.31 main board (Atmel ATSAM3X8E)
#
# Usage:
#   openocd -f tools/openocd/bento-sam3x.cfg
#
# Then in a second terminal:
#   telnet localhost 4444
#
# Inside the OpenOCD telnet:
#   halt
#   at91sam3 gpnvm show 0          ;# 0 = readable, 1 = security on (stop!)
#   dump_image bento_v131.bin 0x00080000 0x80000
#   verify_image bento_v131.bin 0x00080000
#   reset run
#   exit

source [find interface/stlink.cfg]

# ST-Link V2 USB stick: high-level adapter SWD transport
transport select hla_swd

# Conservative speed for first connection; raise to 4000 once stable
adapter speed 1000

# No RST wire connected; rely on power-cycle to reset target
reset_config none

source [find target/at91sam3ax_8x.cfg]
